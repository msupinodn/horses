<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>האם הסוס צריך קובן הלילה?</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 32px; max-width: 420px; width: 100%; text-align: center; }
  h1 { font-size: 1.4rem; margin-bottom: 6px; }
  .sub { font-size: 0.75rem; color: #64748b; margin-bottom: 28px; }
  .horse { font-size: 4rem; margin-bottom: 20px; }
  .question { font-size: 0.95rem; margin-bottom: 16px; color: #cbd5e1; }
  .buttons { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
  .btn { padding: 10px 28px; border: 2px solid #334155; border-radius: 10px; background: #0f172a; color: #e2e8f0; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn:hover { border-color: #60a5fa; color: #60a5fa; }
  .btn.selected { border-color: #3b82f6; background: #1e3a5f; color: #60a5fa; }
  .result { display: none; margin-top: 20px; padding: 20px; border-radius: 12px; }
  .result.yes { background: #422006; border: 1px solid #92400e; }
  .result.no { background: #052e16; border: 1px solid #166534; }
  .result .icon { font-size: 3rem; margin-bottom: 8px; }
  .result .answer { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
  .result.yes .answer { color: #fbbf24; }
  .result.no .answer { color: #4ade80; }
  .result .details { font-size: 0.8rem; color: #94a3b8; line-height: 1.8; }
  .temp-display { font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; min-height: 24px; line-height: 1.8; }
  .temp-display .deg { font-size: 1.1rem; font-weight: 700; color: #60a5fa; }
  .loading { color: #64748b; font-size: 0.8rem; }
  .error { color: #f87171; font-size: 0.8rem; }

  .forecast { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; max-width: 420px; width: 100%; margin-top: 16px; }
  .forecast h2 { font-size: 1.1rem; margin-bottom: 16px; text-align: center; }
  .forecast-grid { display: flex; flex-direction: column; gap: 8px; }
  .forecast-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px 10px; padding: 10px 14px; border-radius: 10px; background: #0f172a; border: 1px solid #334155; font-size: 0.82rem; }
  .forecast-day { font-weight: 600; flex: 1 1 60px; min-width: 60px; }
  .forecast-temps { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .forecast-temps .lo { color: #60a5fa; font-weight: 600; }
  .forecast-icon { font-size: 1.2rem; flex-shrink: 0; min-width: 24px; text-align: center; }
  .forecast-blanket { font-size: 0.72rem; padding: 3px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .blanket-yes { background: #422006; color: #fbbf24; border: 1px solid #92400e; }
  .blanket-no { background: #052e16; color: #4ade80; border: 1px solid #166534; }
  .wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px; }
</style>
</head>
<body>
<div class="wrapper">
<div class="card">
  <div class="horse">🐴</div>
  <h1>האם הסוס צריך קובן הלילה?</h1>
  <div class="sub">חוות איפונה</div>

  <div class="temp-display" id="temp-display">
    <span class="loading">בודק תחזית...</span>
  </div>

  <div id="question-section">
    <div class="question">האם הסוס מגולח?</div>
    <div class="buttons">
      <button class="btn" id="btn-yes" onclick="answer(true)">כן</button>
      <button class="btn" id="btn-no" onclick="answer(false)">לא</button>
    </div>
  </div>

  <div class="result" id="result"></div>
</div>

<div class="forecast" id="forecast">
  <h2>תחזית ל-7 ימים הקרובים</h2>
  <div class="forecast-grid" id="forecast-grid">
    <span class="loading">ענה על השאלה למעלה כדי לראות תחזית</span>
  </div>
</div>
</div>

<script>
const LAT = 32.18, LON = 34.88;
let minTemp = null;
let minTime = null;
let currentTemp = null;
let cachedDaily = null;
let cachedHourlyTimes = null;
let cachedHourlyTemps = null;
let isClipped = null;

const DAY_NAMES = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
const WEATHER_ICONS = {
  0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
  45: '🌫️', 48: '🌫️',
  51: '🌦️', 53: '🌦️', 55: '🌧️',
  61: '🌧️', 63: '🌧️', 65: '🌧️',
  71: '🌨️', 73: '🌨️', 75: '🌨️',
  80: '🌦️', 81: '🌧️', 82: '🌧️',
  95: '⛈️', 96: '⛈️', 99: '⛈️',
};

async function fetchForecast() {
  const display = document.getElementById('temp-display');
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min,weathercode&current_weather=true&timezone=Asia/Jerusalem&forecast_days=8`;
    const res = await fetch(url);
    const data = await res.json();

    currentTemp = data.current_weather.temperature;
    const times = data.hourly.time;
    const temps = data.hourly.temperature_2m;

    const now = new Date();
    const tomorrow7am = new Date(now);
    tomorrow7am.setDate(tomorrow7am.getDate() + 1);
    tomorrow7am.setHours(7, 0, 0, 0);

    minTemp = Infinity;
    minTime = '';
    for (let i = 0; i < times.length; i++) {
      const t = new Date(times[i]);
      if (t >= now && t <= tomorrow7am) {
        if (temps[i] < minTemp) {
          minTemp = temps[i];
          minTime = times[i].slice(11, 16);
        }
      }
    }

    if (minTemp === Infinity) {
      display.innerHTML = '<span class="error">אין נתוני תחזית זמינים</span>';
      return;
    }

    display.innerHTML =
      `כרגע: <span class="deg">${currentTemp}°C</span><br>` +
      `מינימום עד 07:00: <span class="deg">${minTemp}°C</span> (בשעה ${minTime})`;

    cachedDaily = data.daily;
    cachedHourlyTimes = times;
    cachedHourlyTemps = temps;

  } catch (e) {
    display.innerHTML = '<span class="error">שגיאה בקבלת מזג האוויר. נסה לרענן.</span>';
  }
}

function overnightMin(dayDateStr, hourlyTimes, hourlyTemps) {
  const eveningStart = new Date(dayDateStr + 'T18:00:00');
  const morningEnd = new Date(eveningStart);
  morningEnd.setDate(morningEnd.getDate() + 1);
  morningEnd.setHours(7, 0, 0, 0);

  let lo = Infinity;
  for (let i = 0; i < hourlyTimes.length; i++) {
    const t = new Date(hourlyTimes[i]);
    if (t >= eveningStart && t <= morningEnd) {
      if (hourlyTemps[i] < lo) lo = hourlyTemps[i];
    }
  }
  return lo === Infinity ? null : lo;
}

function renderWeeklyForecast() {
  if (!cachedDaily || isClipped === null) return;
  const grid = document.getElementById('forecast-grid');
  const dates = cachedDaily.time;
  const maxTemps = cachedDaily.temperature_2m_max;
  const minTemps = cachedDaily.temperature_2m_min;
  const codes = cachedDaily.weathercode;
  const threshold = isClipped ? 15 : 10;

  let html = '';
  for (let i = 1; i < dates.length - 1; i++) {
    const d = new Date(dates[i] + 'T00:00:00');
    const dayName = 'ליל ' + DAY_NAMES[d.getDay()];
    const icon = WEATHER_ICONS[codes[i]] || '🌡️';
    const nightLo = overnightMin(dates[i], cachedHourlyTimes, cachedHourlyTemps);
    const lo = nightLo !== null ? nightLo : minTemps[i];

    const needsBlanket = lo < threshold;
    const blanketHtml = needsBlanket
      ? '<span class="forecast-blanket blanket-yes">צריך קובן</span>'
      : '<span class="forecast-blanket blanket-no">בלי קובן</span>';

    html += `
      <div class="forecast-row">
        <span class="forecast-day">${dayName}</span>
        <span class="forecast-icon">${icon}</span>
        <span class="forecast-temps">
          <span class="lo">${lo}°</span>
        </span>
        ${blanketHtml}
      </div>`;
  }
  grid.innerHTML = html;
}

function answer(clipped) {
  document.getElementById('btn-yes').classList.toggle('selected', clipped);
  document.getElementById('btn-no').classList.toggle('selected', !clipped);
  isClipped = clipped;
  renderWeeklyForecast();

  if (minTemp === null || minTemp === Infinity) return;

  const threshold = clipped ? 15 : 10;
  const needsBlanket = minTemp < threshold;
  const el = document.getElementById('result');

  const type = clipped ? 'מגולח' : 'לא מגולח';

  if (needsBlanket) {
    el.className = 'result yes';
    el.innerHTML =
      `<div class="icon">🧣</div>` +
      `<div class="answer">כן, צריך קובן!</div>` +
      `<div class="details">` +
        `מינימום הלילה: ${minTemp}°C (בשעה ${minTime})<br>` +
        `סף ל${type}: מתחת ל-${threshold}°C` +
      `</div>`;
  } else {
    el.className = 'result no';
    el.innerHTML =
      `<div class="icon">✨</div>` +
      `<div class="answer">לא צריך קובן</div>` +
      `<div class="details">` +
        `מינימום הלילה: ${minTemp}°C (בשעה ${minTime})<br>` +
        `סף ל${type}: מתחת ל-${threshold}°C` +
      `</div>`;
  }
  el.style.display = 'block';
}

fetchForecast();
</script>
</body>
</html>
